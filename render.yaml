services:
  # PostgreSQL Database
  - type: pserv
    name: todo-db
    plan: free
    region: oregon
    ipAllowList: []

  # Backend Service
  - type: web
    name: be-todo
    env: docker
    dockerfilePath: backend/Dockerfile
    buildContext: ./
    region: oregon
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DB_HOST
        fromService:
          type: pserv
          name: todo-db
          property: host
      - key: DB_USER
        value: todo_user
      - key: DB_PASSWORD
        fromService:
          type: pserv
          name: todo-db
          property: password
      - key: DB_NAME
        fromService:
          type: pserv
          name: todo-db
          property: database
      - key: DB_PORT
        value: 5432
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
    dependsOn:
      - todo-db

  # Frontend Service
  - type: web
    name: fe-todo
    env: docker
    dockerfilePath: frontend/Dockerfile
    buildContext: ./
    region: oregon
    plan: free
    buildCommand: npm run build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: be-todo
          property: host
    dependsOn:
      - be-todo
