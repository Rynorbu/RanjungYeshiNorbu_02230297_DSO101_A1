services:
  # PostgreSQL Database
  - type: pserv
    name: todo-db
    plan: free
    region: oregon
    database: todo_db

  # Backend Service
  - type: web
    name: be-todo
    env: docker
    dockerfilePath: backend/Dockerfile
    region: oregon
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DB_CONNECTION_STRING
        fromService:
          type: pserv
          name: todo-db
          property: connectionString
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production

  # Frontend Service
  - type: web
    name: fe-todo
    env: docker
    dockerfilePath: frontend/Dockerfile
    region: oregon
    plan: free
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: be-todo
          property: host
