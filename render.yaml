services:
  # Backend Service
  - type: web
    name: be-todo
    env: docker
    dockerfilePath: ./backend/Dockerfile
    buildContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: DB_HOST
        value: localhost
      - key: DB_USER
        value: postgres
      - key: DB_PASSWORD
        value: postgres
      - key: DB_NAME
        value: todo_db
      - key: DB_PORT
        value: 5432
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production

  # Frontend Service
  - type: web
    name: fe-todo
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    buildContext: ./frontend
    plan: free
    region: oregon
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: be-todo
          property: host
